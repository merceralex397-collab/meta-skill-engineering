name: Build and Test

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "src-tauri/**"
      - "scripts/**"
      - "skill-*/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Skills and CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci

      - name: Validate CLI contract
        run: python3 scripts/validate_cli_contract.py

      - name: Validate skills
        run: ./scripts/validate-skills.sh

      - name: Dry-run root skill eval
        run: ./scripts/run-evals.sh --dry-run skill-creator

  tauri-check:
    name: Tauri Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci

      - name: Build web UI
        run: npm run build

      - name: Check Tauri Rust crate
        run: cargo check --manifest-path src-tauri/Cargo.toml
