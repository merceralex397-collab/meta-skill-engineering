name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 1.0.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as prerelease"
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build Tauri Artifact (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux
          - os: windows-latest
            artifact: windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri -- build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: meta-skill-studio-${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/**

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Determine release metadata
        id: metadata
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#v}"
            TAG_NAME="v$VERSION"
            IS_PRERELEASE="${{ github.event.inputs.prerelease }}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG_NAME#v}"
            IS_PRERELEASE="false"
            if [[ "$VERSION" =~ -[A-Za-z] ]]; then
              IS_PRERELEASE="true"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Meta Skill Studio ${{ steps.metadata.outputs.version }}"
          tag_name: ${{ steps.metadata.outputs.tag_name }}
          files: release-artifacts/**
          generate_release_notes: true
          prerelease: ${{ steps.metadata.outputs.is_prerelease == 'true' }}
          body: |
            ## Meta Skill Studio ${{ steps.metadata.outputs.version }}

            Cross-platform Tauri artifacts built from the authoritative Python Studio CLI contract.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
